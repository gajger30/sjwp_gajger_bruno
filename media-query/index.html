<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: repeat(5, 1fr);
                width: 100%;
                height: 100vh;
        }
        .container > div {
            text-align: center;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .header {
            background-color: coral;
        }

        .main {
            background-color: navajowhite;
        }

        .left {
            background-color: lightyellow;
        }

        .right {
            background-color: lightgreen;
        }

        .footer {
            background-color: skyblue;
        }
        @media (min-width: 481px) and (max-width: 1200px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(8, 1fr);
            }
            .container > div {
                text-align: center;
                font-size: 30px;
                font-family: Arial, Helvetica, sans-serif;
            }
            .header {
                grid-column: 1 / 3;
                grid-row: 1 / 2;
            }
            .main {
                grid-column: 1 / 3;
                grid-row: 2 / 5;
            }
            .left {
                grid-column: 1 / 2;
                grid-row: 5 / 8;
            }
            .right {
                grid-column: 2 / 3;
                grid-row: 5 / 8;
            }
            .footer {
                grid-column: 1 / 3;
                grid-row: 8 / 9;
            }
        }
        @media (min-width: 1201px) {
            .container {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(7, 1fr);
                width: 100%;
                height: 100vh;
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
            .header {
                grid-column: 1 / 5;
                grid-row: 1 / 2;
            }
            .main {
                grid-column: 2 / 4;
                grid-row: 2 / 7;
            }
            .left {
                grid-column: 1 / 2;
                grid-row: 2 / 7;
            }
            .right {
                grid-column: 4 / 5;
                grid-row: 2 / 7;
            }
            .footer {
                grid-column: 1 / 5;
                grid-row: 7 / 8;
            }
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="main">Main</div>
        <div class="left">Left</div>
        <div class="right">Right</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
