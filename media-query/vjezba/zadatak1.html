<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: repeat(5, 1fr);
                width: 100%;
                height: 100vh;
        }
        .header{
            background-color: red;
            color: black;
        }
        .main{
            background-color: white;
            color: black;
        }
        .left{
            background-color: yellow;
            color: black;
        }
        .right{
            background-color: greenyellow;
            color: black;
        }
        .footer{
            background-color: cyan;
            color: black;
        }

        @media(max-width: 480px){
            .container{
                grid-template-columns: 1fr;
                grid-template-rows: repeat(5, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
        }

        @media (min-width: 481px) and (max-width: 1200px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(8, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
            .header {
                grid-column: 1 / 3;
                grid-row: 1 / 2;
            }
            .main {
                grid-column: 1 / 3;
                grid-row: 2 / 5;
            }
            .left {
                grid-column: 1 / 2;
                grid-row: 5 / 8;
            }
            .right {
                grid-column: 2 / 3;
                grid-row: 5 / 8;
            }
            .footer {
                grid-column: 1 / 3;
                grid-row: 8 / 9;
            }
        }

        @media(min-width: 1201px){
            .container{
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(7, 1fr);
                width: 100%;
                height: 100vh;
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
            .header{
                grid-column: 1/8;
                grid-row: 1/2;
            }
            .main{
                grid-column: 2/4;
                grid-row: 2/7;
            }
            .left{
                grid-column: 1/2;
                grid-row: 2/7;
            }
            .right{
                grid-column: 4/5;
                grid-row: 2/7;
            }
            .footer{
                grid-column: 1/8;
                grid-row: 7/8;
            }
        }


    </style>


</head>
<body>

    <div class="container">
        <div class="header">header</div>
        <div class="main">main</div>
        <div class="left">left</div>
        <div class="right">right</div>
        <div class="footer">footer</div>
    </div>
    
</body>
</html>
