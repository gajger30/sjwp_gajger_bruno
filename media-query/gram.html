<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
        }
        .header {
            background-color: navy;
            color: white;
        }
        .menu {
            background-color: coral;
            color: white;
        }
        .hero {
            background-color: dodgerblue;
            color: white;
        }
        .main {
            background-color: steelblue;
            color: white;
        }
        .banner {
            background-color: sandybrown;
        }
        .extra {
            background-color: mediumseagreen;
        }
        .image {
            background-color: lightsteelblue;
        }
        @media (max-width: 480px) {
            .container {
                grid-template-rows: repeat(14,1fr);
                gap: 0px;
                height: 100vh;
            }
            .container > div {
                text-align: center;
                font-size: 30px;
                font-family: Arial, Helvetica, sans-serif;
            }
            .header {
                grid-row: 1 / 2;
            }
            .menu {
                grid-row: 2 / 3;
            }
            .hero {
                grid-row: 3 / 6;
            }
            .main {
                grid-row: 6 / 9;
            }
            .banner {
                grid-row: 9 / 11;
            }
            .extra {
                grid-row: 11 / 13;
            }
            .image {
                grid-row: 13 / 15;
            }
        }
        @media (min-width: 481px) and (max-width: 1200px) {
            .container {
                grid-template-rows: repeat(13,1fr);
                grid-template-columns: repeat(4,1fr);
                gap: 0px;
                height: 100vh;
            }
            .container > div {
                text-align: center;
                font-size: 30px;
                font-family: Arial, Helvetica, sans-serif;
            }
            .header {
                grid-row: 1 / 2;
                grid-column: 1 / 5;
            }
            .menu {
                grid-row: 6 / 14;
                grid-column: 1 / 2;
            }
            .hero {
                grid-row: 2 / 6;
                grid-column: 1 / 5;
            }
            .main {
                grid-row: 6 / 10;
                grid-column: 2 / 5;
            }
            .banner {
                grid-row: 10 / 12;
                grid-column: 2 / 5;
            }
            .extra {
                grid-row: 12 / 15;
                grid-column: 2 / 4;
            }
            .image {
                grid-row: 12 / 15;
                grid-column: 4 / 5;
            }
        }
        @media (min-width: 1201px) {
            .container {
                grid-template-rows: repeat(12,1fr);
                grid-template-columns: repeat(4,1fr);
                gap: 0px;
                height: 100vh;
            }
            .container > div {
                text-align: center;
                font-size: 30px;
                font-family: Arial, Helvetica, sans-serif;
            }
            .header {
                grid-row: 1 / 2;
                grid-column: 1 / 2;
            }
            .menu {
                grid-row: 1 / 2;
                grid-column: 2 / 5;
            }
            .hero {
                grid-row: 2 / 7;
                grid-column: 1 / 5;
            }
            .main {
                grid-row: 7 / 11;
                grid-column: 1 / 3;
            }
            .banner {
                grid-row: 11 / 13;
                grid-column: 1 / 5;
            }
            .extra {
                grid-row: 7 / 9;
                grid-column: 4 / 5;
            }
            .image {
                grid-row: 9 / 11;
                grid-column: 4 / 5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="menu">Menu</div>
        <div class="hero">Hero</div>
        <div class="main">Main</div>
        <div class="banner">Banner</div>
        <div class="extra">Extra</div>
        <div class="image">Image</div>
    </div>    
</body>
</html>

</html>
