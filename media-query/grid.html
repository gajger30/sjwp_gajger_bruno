<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            width: 100%;
            height: 100vh;
        }
         .container > div {
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 2rem;
                color: black;
                margin: 5px;
            }
            .container > .orange1, .container > .orange2 {
                background-color: orange;
            }
            .container > .lime {
                background-color: lime;
            }
            .container > .blue1, .container > .blue2, .container > .blue3 {
                background-color: blue;
            }
            .container > .gray1, .container > .gray2, .container > .gray3, .container > .gray4 {
                background-color: gray;
            }
        @media (max-width: 767px) {
            .container {
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: repeat(10, 1fr);
            }

            

        }
        @media (min-width: 768px) and (max-width: 1023px) {
            .container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(9, 1fr);
            }
            .orange1 {
                grid-column: 1 / 3;
                grid-row: 1 / 2;
            }
            .orange2 {
                grid-column: 1 / 3;
                grid-row: 2 / 3;
            }
            .lime {
                grid-column: 1 / 3;
                grid-row: 3 / 5;
            }
            .blue1 {
                grid-column: 1 / 3;
                grid-row: 5 / 6;
            }
            .blue2 {
                grid-column: 1 / 3;
                grid-row: 6 / 7;
            }
            .blue3 {
                grid-column: 1 / 3;
                grid-row: 7 / 8;
            }
             .gray1 {
                grid-column: 1 / 2;
                grid-row: 8 / 9;
            }
             .gray2 {
                grid-column: 2 / 3;
                grid-row: 8 / 9;
            }
             .gray3 {
                grid-column: 1 / 2;
                grid-row: 9 / 10;
            }
             .gray4 {
                grid-column: 2 / 3;
                grid-row: 9 / 10;
            }
            

        }
        @media (min-width: 1024px) {
            .container {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                grid-template-rows: repeat(7, 1fr);
            }
            .orange1 {
                grid-column: 1 / 7;
                grid-row: 1 / 2;
            }
            .orange2 {
                grid-column: 7 / 13;
                grid-row: 1 / 2;
            }
            .lime {
                grid-column: 1 / 13;
                grid-row: 2 / 5;
            }
            .blue1 {
                grid-column: 1 / 5;
                grid-row: 5 / 7;
            }
            .blue2 {
                grid-column: 5 / 9;
                grid-row: 5 / 7;
            }
            .blue3 {
                grid-column: 9 / 13;
                grid-row: 5 / 7;
            }
             .gray1 {
                grid-column: 1 / 4;
                grid-row: 7 / 8;
            }
             .gray2 {
                grid-column: 4 / 7;
                grid-row: 7 / 8;
            }
             .gray3 {
                grid-column: 7 / 10;
                grid-row: 7 / 8;
            }
             .gray4 {
                grid-column: 10 / 13;
                grid-row: 7 / 8;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="orange1"></div>
        <div class="orange2"></div>
        <div class="lime"></div>
        <div class="blue1"></div>
        <div class="blue2"></div>
        <div class="blue3"></div>
        <div class="gray1"></div>
        <div class="gray2"></div>
        <div class="gray3"></div>
        <div class="gray4"></div>
    </div>
</body>
</html>
