<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Vjezba</title>

    <style>

        .container{
            display: grid;
/*             grid-template-columns: 1fr,1fr, 1fr;
            grid-template-rows: 1fr, 1fr; */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 5px;
            margin-top: 200px;
            margin-left: 50px;
            margin-right: 50px;
            
            
        }
        /* grid-area: 1 / 3 / 3 / 4;  rowstart, columnstart, rowend, columnend */
        .panel{
            font-size: 2rem;
            background-color: grey;
            text-align: center;
            height: 150px;
            padding-top: 100px;
            
            
        }
        p{
            color: white;
        }


    </style>


</head>
<body>

    <div class="container">
        <div class="panel"><p>D</p></div>
        <div class="panel"><p>A</p></div>
        <div class="panel"><p>F</p></div>
        <div class="panel"><p>E</p></div>
        <div class="panel"><p>C</p></div>
        <div class="panel"><p>B</p></div>
        


    </div>
    
</body>
</html>
