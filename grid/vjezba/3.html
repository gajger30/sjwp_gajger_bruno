<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Vjezba</title>

    <style>

        .grid {
            display: grid;
            grid-template-columns: 1fr, 2fr;
            
            gap: 10px;
            
        }

        .grid div {
                    background: #555;
                    color: white;
                    font-size: 24px;
                    height: 100px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

        .a {
            grid-column: 1/2;
            grid-row: 1;
        }

        .b {
            grid-column: 2/3;
            grid-row: 1;
        }
        .c{
            grid-column: 1/2;
            grid-row: 2;
        }
        .d {
            grid-column: 2/3;
            grid-row: 2;
        }
        .e {
             grid-column: 1/3;
            grid-row: 3;
        }

    </style>


</head>
<body>

    <div class="grid">
        <div class="a">A</div>
        <div class="b">B</div>
        <div class="c">C</div>
        <div class="d">D</div>
        <div class="e">E</div>
    </div>
    
</body>
</html>
