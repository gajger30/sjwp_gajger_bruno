<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 1</title>
    <style>
        .container{
            display: grid; 
            width: 100%;
            height: 98vh;
            
        }
        .a{
            background-color: white;
            color: black;
            border: 5px solid gray;
            
        }
        .b{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        .c{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        .d{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        .e{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        .f{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        .g{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        .h{
            background-color: white;
            color: black;
            border: 5px solid gray;
        }
        @media(min-width: 1024px){
            .container{
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(2, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 12px;
                font-size: 35px;
            }
        }
        @media(min-width: 768px) and (max-width: 1023px){
            .container{
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 12px;
                font-size: 35px;
            }
        }
        @media(max-width: 767){
            .container{
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(8, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 12px;
                font-size: 35px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="a">Proizvod 1</div>
        <div class="b">Proizvod 2</div>
        <div class="c">Proizvod 3</div>
        <div class="d">Proizvod 4</div>
        <div class="e">Proizvod 5</div>
        <div class="f">Proizvod 6</div>
        <div class="g">Proizvod 7</div>
        <div class="h">Proizvod 8</div>
    </div>
</body>
</html>
