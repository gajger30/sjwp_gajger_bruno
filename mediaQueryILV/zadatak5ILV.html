<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 5</title>

<style>
    .container{
            display: grid; 
            width: 100%;
            height: 98vh; 
        }
        .a{
            background-color: aliceblue;
            color: black;
        }
        .b{
            background-color: antiquewhite;
            color: black;
        }
        .c{
            background-color: aqua;
            color: black;
        }
        .d{
            background-color: cadetblue;
            color: black;
        }
        .e{
            background-color: yellow;
            color: black;
        }
        .f{
            background-color: pink;
            color: black;
        }
        @media(min-width: 1024px){
            .container{
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(2, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
            .a{
                grid-column: 1/4;
                grid-row: 1/2;
            }
        }
         @media(max-width: 767){
            .container{
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(5, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
         }
</style>


</head>
<body>
    <div class="container">
        <div class="a">1</div>
        <div class="b">2</div>
        <div class="c">3</div>
        <div class="d">4</div>
        <div class="e">5</div>
        <div class="f">6</div>
    </div>
</body>
</html>
