<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 2</title>

    <style>
        .container{
            display: grid; 
            width: 100%;
            height: 98vh;
        }
        .header{
            background-color: plum;
            color: black;
        }
        .main{
            background-color: bisque;
            color: black;
        }
        .sidebar{
            background-color: lightgreen;
            color: black;
        }
        .footer{
            background-color: lightskyblue;
            color: black;
        }

        @media(min-width: 1024px){
            .container{
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(5, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
            .header{
                grid-row: 1/2;
                grid-column: 1/6;
            }
            .footer{
                grid-row: 5/6;
                grid-column: 1/6;
            }
            .main{
                grid-column: 2/5;
                grid-row: 2/5;
            }
            .sidebar{
                grid-column: 1/2;
                grid-row: 2/5;
            }

            @media(max-width: 768){
                .container{
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
            .header{
                grid-row: 1/2;
                grid-column: 1/2;
            }
            .footer{
                grid-row: 2/3;
                grid-column: 1/2;
            }
            .main{
                grid-column: 1/2;
                grid-row: 3/4;
            }
            .sidebar{
                grid-column: 1/2;
                grid-row: 4/5   ;
            }
            }
        }
    </style>


</head>
<body>
    <div class="container">
        <div class="header">header</div>
        <div class="main">main</div>
        <div class="sidebar">sidebar</div>
        <div class="footer">footer</div>
    </div>
</body>
</html>
