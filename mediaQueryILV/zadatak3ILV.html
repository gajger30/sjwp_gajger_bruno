<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 3</title>

    <style>
        .container{
            display: grid; 
            width: 100%;
            height: 98vh;
            
        }
        .a{
            background-color: aliceblue;
            color: black;
        }
        .b{
            background-color: antiquewhite;
            color: black;
        }
        .c{
            background-color: aqua;
            color: black;
        }
        .d{
            background-color: aquamarine;
            color: black;
        }
        .e{
            background-color: slateblue;
            color: black;
        }
        .f{
            background-color: indigo;
            color: black;
        }
        .g{
            background-color: violet;
            color: black;
        }
        .h{
            background-color: cornflowerblue;
            color: black;
        }
        .i{
            background-color: fuchsia;
            color: black;
        }
        .j{
            background-color: navajowhite;
            color: black;
        }
        .k{
            background-color: khaki;
            color: black;
        }
        .l{
            background-color: lawngreen;
            color: black;
        }
        @media(min-width: 1024px){
            .container{
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
        }
        @media(min-width: 768px) and (max-width: 1023px){
            .container{
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 12px;
                font-size: 35px;
            }
        }
         @media(max-width: 767){
            .container{
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(12, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
         }
    </style>
</head>
<body>
    <div class="container">
        <div class="a">1</div>
        <div class="b">2</div>
        <div class="c">3</div>
        <div class="d">4</div>
        <div class="e">5</div>
        <div class="f">6</div>
        <div class="g">7</div>
        <div class="h">8</div>
        <div class="i">9</div>
        <div class="j">10</div>
        <div class="k">11</div>
        <div class="l">12</div>
    </div>
</body>
</html>
