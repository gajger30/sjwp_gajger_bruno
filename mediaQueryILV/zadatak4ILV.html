<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 4</title>
</head>

<style>
    .container{
            display: grid; 
            width: 100%;
            height: 98vh;
        }
        .a{
            background-color: aliceblue;
            color: black;
        }
        .b{
            background-color: antiquewhite;
            color: black;
        }
        .c{
            background-color: aqua;
            color: black;
        }
        .d{
            background-color: cadetblue;
            color: black;
        }
        .e{
            background-color: yellow;
            color: black;
        }
        @media(min-width: 1024px){
            .container{
                grid-template-columns: repeat(5, 1fr);
                grid-template-rows: repeat(1, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
        }
        @media(min-width: 768px) and (max-width: 1023px){
            .container{
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 12px;
                font-size: 35px;
            }
            .e{
                grid-column: 1/3;
                grid-row: 3/4;
            }
        }
        @media(max-width: 767){
            .container{
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(5, 1fr);
            }
            .container > div {
                text-align: center;
                padding: 30px;
                font-size: 35px;
            }
         }
</style>

<body>
    <div class="container">
        <div class="a">1</div>
        <div class="b">2</div>
        <div class="c">3</div>
        <div class="d">4</div>
        <div class="e">5</div>
    </div>
</body>
</html>
